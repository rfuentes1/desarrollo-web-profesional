<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diseño web con position y float</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="contenedor">
        <header>
            <div class="fila"> <!-- fila es un contenedor de columnas -->
                <div class="col1">
                    <h1>Bienvenido</h1>
                    <p>Este es el encabezado de la página</p>                      
                </div>
            </div>  
        </header>

        <main> 
            <div class="fila"> <!-- fila es un contenedor de columnas -->
                <div class="col4">col4 -250px</div>
                <div class="col4">col4 -250px</div>
                <div class="col4">col4 -250px</div>
                <div class="col4">col4 -250px</div>
            </div> 
            <div class="fila"> <!-- fila es un contenedor de columnas -->
                <div class="col3">col3 -350px</div>
                <div class="col3">col3 -350px</div>
                <div class="col3">col3 -350px</div>
            </div>       
            <div class="fila"> <!-- fila es un contenedor de columnas -->
                <div class="col2">col2 -550px</div>
                <div class="col2">col2 -550px</div>
            </div>                        
        </main>

        <footer>
            <div class="fila"> <!-- fila es un contenedor de columnas -->
                <div class="col1">Pie de página - 1150px</div>
            </div>
        </footer>
    </div>
</body>
</html>
